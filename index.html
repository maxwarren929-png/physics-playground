<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physics Playground</title>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- Toolbar -->
  <div id="toolbar">
    <button class="tool-btn active" data-tool="spawn" title="Spawn Shapes">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="6"/><rect x="4" y="4" width="6" height="6"/><polygon points="18,4 22,16 14,16"/></svg>
      <span>Spawn</span>
    </button>
    <button class="tool-btn" data-tool="explode" title="Explosion">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2" fill="none" stroke="currentColor" stroke-width="2"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
      <span>Explode</span>
    </button>
    <button class="tool-btn" data-tool="wall" title="Draw Walls">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
      <span>Wall</span>
    </button>
    <button class="tool-btn" data-tool="gravity" title="Gravity Well">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
      <span>Gravity</span>
    </button>
    <button class="tool-btn" data-tool="erase" title="Erase">
      <svg viewBox="0 0 24 24"><path d="M20 20H7l-5-5 9-9 9 9-5 5z"/><line x1="18" y1="13" x2="11" y2="6"/></svg>
      <span>Erase</span>
    </button>
    <div class="toolbar-divider"></div>
    <button class="tool-btn" data-tool="spring" title="Spring">
      <svg viewBox="0 0 24 24"><path d="M4 20 L8 8 L12 14 L16 6 L20 18" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      <span>Spring</span>
    </button>
    <div class="toolbar-divider"></div>
    <button class="tool-btn" id="clearBtn" title="Clear All">
      <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
      <span>Clear</span>
    </button>
    <button class="tool-btn" id="pauseBtn" title="Pause / Resume">
      <svg viewBox="0 0 24 24" id="pauseIcon"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      <span id="pauseLabel">Pause</span>
    </button>
  </div>

  <!-- Tool options bar -->
  <div id="toolOptions">
    <div id="spawnOptions" class="tool-options-group active">
      <button class="opt-btn active" data-shape="circle">&#x25CB; Circle</button>
      <button class="opt-btn" data-shape="rect">&#x25A1; Square</button>
      <button class="opt-btn" data-shape="triangle">&#x25B3; Triangle</button>
      <button class="opt-btn" data-shape="ragdoll">&#x263C; Ragdoll</button>
      <button class="opt-btn" data-shape="force">&#x2192; Force</button>
      <button class="opt-btn" data-shape="immovable">&#x25A3; Immovable</button>
      <label>Size: <input type="range" id="shapeSize" min="3" max="16" step="1" value="8"></label>
      <span id="shapeSizeVal">8</span>
      <div id="forceOptions" style="display:none; margin-top:5px; border-top:1px solid #444; padding-top:5px;">
        <label>Force: <input type="range" id="forceStrength" min="0.001" max="0.01" step="0.001" value="0.003"></label>
        <span id="forceStrengthVal">0.003</span><br>
        <label>Angle: <input type="range" id="forceAngle" min="0" max="6.28" step="0.1" value="0"></label>
        <span id="forceAngleVal">0.0</span>
      </div>
    </div>
    <div id="explodeOptions" class="tool-options-group">
      <label>Power: <input type="range" id="explosionStrength" min="0.05" max="1.0" step="0.05" value="0.3"></label>
      <span id="explosionStrengthVal">0.30</span>
    </div>
    <div id="gravityOptions" class="tool-options-group">
      <button class="opt-btn active" data-gravity="well">Well</button>
      <button class="opt-btn" data-gravity="hole">Hole</button>
      <label>Pull: <input type="range" id="gravityStrength" min="0.1" max="30" step="0.1" value="12"></label>
      <span id="gravityStrengthVal">12.0</span>
    </div>
    <div id="springOptions" class="tool-options-group">
      <span style="color:#555;font-size:10px;">Click a body &#x2192; click another body (or empty space)</span>
      <label>Stiff: <input type="range" id="springStiffness" min="0.01" max="0.5" step="0.01" value="0.05"></label>
      <span id="springStiffnessVal">0.05</span>
    </div>
  </div>

  <!-- View options bar -->
  <div id="viewOptions">
    <span class="opt-label">WORLD:</span>
    <button class="opt-btn active" data-worldsize="small">S</button>
    <button class="opt-btn" data-worldsize="medium">M</button>
    <button class="opt-btn" data-worldsize="large">L</button>
    <div class="toolbar-divider-v"></div>
    <button class="opt-btn" id="windToggle">WIND:OFF</button>
    <button class="opt-btn" id="resetCamBtn">&#x25CB; RESET</button>
  </div>

  <!-- Key hints -->
  <div id="keyHints">
    <span>Z:Zoom</span><span>RClick:Pan</span><span>W:Wind</span><span>X:World</span><span>R:Cam</span><span>C:Clear</span><span>6:Spring</span><span>Space:Pause</span>
  </div>

  <!-- HUD -->
  <div id="hud">
    <span id="objectCounter">OBJECTS: 0</span>
    <span id="fpsDisplay"></span>
  </div>

  <script>
  window.onerror = function(msg, url, line, col, err) {
    console.error('GLOBAL ERROR:', msg, 'at', url+':'+line+':'+col);
    if (err && err.stack) console.error('STACK:', err.stack);
    document.body.innerHTML = '<div style="color:red;padding:20px;font-family:monospace;font-size:14px">'
      + '<b>ERROR:</b> ' + msg + '<br><br>'
      + '<b>File:</b> ' + url + ':' + line + ':' + col + '<br><br>'
      + (err && err.stack ? '<pre>' + err.stack + '</pre>' : '')
      + '</div>';
    return true;
  };
  </script>
  <script src="matter.min.js"></script>
  <script src="lib/poly-decomp.js"></script>
  <script src="js/physics.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/tools.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
