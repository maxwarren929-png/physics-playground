<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physics Playground</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- Toolbar -->
  <div id="toolbar">
    <button class="tool-btn active" data-tool="spawn" title="Spawn Shapes">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="6"/><rect x="4" y="4" width="6" height="6" rx="1"/><polygon points="18,4 22,16 14,16"/></svg>
      <span>Spawn</span>
    </button>
    <button class="tool-btn" data-tool="explode" title="Explosion">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2" fill="none" stroke="currentColor" stroke-width="2"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
      <span>Explode</span>
    </button>
    <button class="tool-btn" data-tool="wall" title="Draw Walls">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
      <span>Wall</span>
    </button>
    <button class="tool-btn" data-tool="gravity" title="Gravity Well">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="2 2"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
      <span>Gravity</span>
    </button>
    <button class="tool-btn" data-tool="erase" title="Erase">
      <svg viewBox="0 0 24 24"><path d="M20 20H7l-5-5 9-9 9 9-5 5z"/><line x1="18" y1="13" x2="11" y2="6"/></svg>
      <span>Erase</span>
    </button>
    <div class="toolbar-divider"></div>
    <button class="tool-btn" id="clearBtn" title="Clear All">
      <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
      <span>Clear</span>
    </button>
    <button class="tool-btn" id="pauseBtn" title="Pause / Resume">
      <svg viewBox="0 0 24 24" id="pauseIcon"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      <span id="pauseLabel">Pause</span>
    </button>
  </div>

  <!-- Tool options bar -->
  <div id="toolOptions">
    <div id="spawnOptions" class="tool-options-group active">
      <button class="opt-btn active" data-shape="circle">● Circle</button>
      <button class="opt-btn" data-shape="rect">■ Square</button>
      <button class="opt-btn" data-shape="triangle">▲ Triangle</button>
    </div>
    <div id="gravityOptions" class="tool-options-group">
      <label>Strength: <input type="range" id="gravityStrength" min="0.0001" max="0.005" step="0.0001" value="0.0015"></label>
      <span id="gravityStrengthVal">0.0015</span>
    </div>
  </div>

  <!-- Object counter -->
  <div id="objectCounter">Objects: 0</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="js/physics.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/tools.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
